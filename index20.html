const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const formatDate = (str) => {
  const d = new Date(str);
  const days = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
};

const dateOffset = (base, offset) => {
  const d = new Date(base);
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const isTrainingDay = (dateStr, trainingDays) => {
  const d = new Date(dateStr);
  return trainingDays.includes(d.getDay());
};

// ============ STORAGE (dual-mode: Claude artifact + localStorage + IndexedDB shadow) ============
const HAS_CLAUDE_STORAGE = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
const LS_PREFIX = 'nutt_nutrition_';
const IDB_NAME = 'nutt_nutrition_db';
const IDB_STORE = 'kv';

// IndexedDB shadow — more durable than localStorage on iOS Safari
const IDB = {
  _db: null,
  async _open() {
    if (this._db) return this._db;
    if (!window.indexedDB) return null;
    return new Promise((resolve) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
      req.onsuccess = () => { this._db = req.result; resolve(this._db); };
      req.onerror = () => resolve(null);
    });
  },
  async get(key) {
    const db = await this._open();
    if (!db) return null;
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      } catch { resolve(null); }
    });
  },
  async set(key, value) {
    const db = await this._open();
    if (!db) return false;
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).put(value, key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      } catch { resolve(false); }
    });
  },
  async delete(key) {
    const db = await this._open();
    if (!db) return false;
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        tx.objectStore(IDB_STORE).delete(key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
      } catch { resolve(false); }
    });
  },
  async listKeys(prefix = '') {
    const db = await this._open();
    if (!db) return [];
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).getAllKeys();
        req.onsuccess = () => {
          const keys = (req.result || []).filter(k => typeof k === 'string' && k.startsWith(prefix));
          resolve(keys);
        };
        req.onerror = () => resolve([]);
      } catch { resolve([]); }
    });
  }
};

const Storage = {
  async get(key, fallback = null) {
    try {
      if (HAS_CLAUDE_STORAGE) {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : fallback;
      }
      // Try localStorage first (fast)
      const v = localStorage.getItem(LS_PREFIX + key);
      if (v !== null) return JSON.parse(v);
      
      // Fallback to IndexedDB (durable)
      const idbVal = await IDB.get(key);
      if (idbVal !== null) {
        // Restore to localStorage
        try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(idbVal)); } catch {}
        return idbVal;
      }
      return fallback;
    } catch { return fallback; }
  },
  async set(key, value) {
    try {
      if (HAS_CLAUDE_STORAGE) {
        await window.storage.set(key, JSON.stringify(value));
      } else {
        // Write to both localStorage (fast) and IndexedDB (durable)
        try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); } catch {}
        IDB.set(key, value); // fire-and-forget for IDB
      }
      return true;
    } catch { return false; }
  },
  async delete(key) {
    try {
      if (HAS_CLAUDE_STORAGE) {
        await window.storage.delete(key);
      } else {
        try { localStorage.removeItem(LS_PREFIX + key); } catch {}
        IDB.delete(key);
      }
      return true;
    } catch { return false; }
  },
  async list(prefix = '') {
    try {
      if (HAS_CLAUDE_STORAGE) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      }
      // Combine keys from both stores
      const keySet = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_PREFIX + prefix)) {
          keySet.add(k.replace(LS_PREFIX, ''));
        }
      }
      const idbKeys = await IDB.listKeys(prefix);
      idbKeys.forEach(k => keySet.add(k));
      return Array.from(keySet);
    } catch { return []; }
  },
  mode() { return HAS_CLAUDE_STORAGE ? 'claude' : 'browser'; }
};

// Calculate kcal burn from steps (rough formula: stride 0.7m, 0.04 kcal/step at 75kg)
function stepsToKcal(steps, weight = 75) {
  return Math.round(steps * 0.04 * (weight / 75));
}

// Calculate kcal from cardio (MET-based, weight-aware)
// Incline walk: speed × incline determines MET
function cardioKcal({ speed, incline, minutes, weight = 75, type = 'incline_walk' }) {
  const s = parseFloat(speed) || 0;
  const inc = parseFloat(incline) || 0;
  const m = parseFloat(minutes) || 0;
  if (!m) return 0;
  
  let met = 0;
  if (type === 'incline_walk') {
    // Base walking MET by speed, then add incline factor
    // 4 km/h flat = 3 MET, 5 km/h = 3.5, 6 km/h = 4.3
    let baseMet = 2.5 + (s * 0.35);
    // Incline adds ~0.1 MET per 1%
    met = baseMet + (inc * 0.12);
  } else if (type === 'treadmill_run') {
    // Running ~8 km/h = 8 MET, 10 km/h = 10, 12 km/h = 12
    met = Math.max(6, s * 0.95);
  } else if (type === 'bike') {
    met = 7; // moderate cycling
  } else if (type === 'elliptical') {
    met = 7;
  } else {
    met = 5;
  }
  
  // Formula: kcal = MET × weight(kg) × hours
  return Math.round(met * weight * (m / 60));
}

// Calculate kcal from strength training
// Based on completed sets, exercise type (compound vs isolation), and weight
// A set counts as "performed" if marked done OR has both weight and reps entered
function isSetPerformed(s) {
  if (!s) return false;
  if (s.done) return true;
  const hasWeight = s.weight !== '' && s.weight != null;
  const hasReps = s.reps !== '' && s.reps != null;
  return hasWeight && hasReps;
}

function strengthKcal({ sets_done = [], type = 'isolation', weight = 75 }) {
  const completedSets = sets_done.filter(isSetPerformed).length;
  if (!completedSets) return 0;
  
  // MET values for resistance training:
  // - Vigorous (compound, heavy) = 6 MET
  // - Moderate (isolation) = 4 MET
  // Each set ~45-60 sec work + rest ~60-90 sec = ~2 min total
  const minutesPerSet = type === 'compound' ? 2.5 : 2;
  const met = type === 'compound' ? 6 : 4;
  const minutes = completedSets * minutesPerSet;
  
  return Math.round(met * weight * (minutes / 60));
}

// Helper: get exercise definition by id
function getExercise(id) {
  return EXERCISE_LIBRARY.find(e => e.id === id);
}

// Helper: estimate steps taken on a treadmill walk/run (to avoid double-count with daily total steps)
// Walking cadence ~ speed-dependent; rough avg 110-125 steps/min at 5-6 km/h
function treadmillSteps({ speed, minutes, type }) {
  const s = parseFloat(speed) || 0;
  const m = parseFloat(minutes) || 0;
  if (!m) return 0;
  // Only walking/running on treadmill produces "steps". Bike/elliptical do not.
  if (type !== 'incline_walk' && type !== 'treadmill_run') return 0;
  // Cadence estimate: ~100 + speed×4 steps/min (5km/h≈120, 8km/h≈132 for running ~150)
  const cadence = type === 'treadmill_run' ? 150 : Math.round(100 + s * 4);
  return Math.round(cadence * m);
}

// Helper: compute workout calorie burn from a saved workout session object
// Returns { steps, strength, cardio, workout, total, rawSteps, treadmillStepsEst, netSteps }
// NOTE: For net-energy, only strength+cardio should be added on top of TDEE
// (steps are already included in TDEE baseline)
// Daily total steps already INCLUDE treadmill steps, so we subtract the estimated
// treadmill steps before computing "free-living" step kcal to avoid double-counting
// the incline-walk (which is also logged as cardio with the more-accurate MET formula).
function computeWorkoutBurn(workoutData, weight = 75) {
  if (!workoutData) return { steps: 0, strength: 0, cardio: 0, workout: 0, total: 0, rawSteps: 0, treadmillStepsEst: 0, netSteps: 0 };
  const rawSteps = parseInt(workoutData.steps) || 0;
  let strength = 0, cardio = 0, treadmillStepsEst = 0;
  (workoutData.exercises || []).forEach(ex => {
    const exDef = getExercise(ex.exerciseId);
    if (!exDef) return;
    const sd = ex.sets_done || [];
    if (exDef.type === 'cardio') {
      cardio += cardioKcal({ speed: sd[0]?.speed, incline: sd[0]?.incline, minutes: sd[0]?.reps, weight, type: ex.exerciseId });
      treadmillStepsEst += treadmillSteps({ speed: sd[0]?.speed, minutes: sd[0]?.reps, type: ex.exerciseId });
    } else {
      strength += strengthKcal({ sets_done: sd, type: exDef.type, weight });
    }
  });
  // Subtract treadmill steps from daily total to avoid double-counting with cardio MET kcal
  const netSteps = Math.max(0, rawSteps - treadmillStepsEst);
  const steps = stepsToKcal(netSteps, weight);
  return { steps, strength, cardio, workout: strength + cardio, total: steps + strength + cardio, rawSteps, treadmillStepsEst, netSteps };
}

// Helper: get suggested exercises for body part
function getExercisesForPart(part) {
  const ids = BODY_PARTS[part] || [];
  return ids.map(id => getExercise(id)).filter(Boolean);
}

// Helper: safety badge for exercise
function getSafetyBadge(safety) {
  if (safety === 'machine_safest') return { icon: '🟢', label: 'เครื่อง', color: '#065F46', bg: '#D1FAE5' };
  if (safety === 'safe_solo') return { icon: '🟡', label: 'คนเดียวได้', color: '#92400E', bg: '#FEF3C7' };
  if (safety === 'spotter_recommended') return { icon: '🔴', label: 'ต้องมี spotter', color: '#991B1B', bg: '#FEE2E2' };
  return { icon: '⚪', label: '', color: '#6B6862', bg: 'rgba(0,0,0,0.05)' };
}

// ============ AI FOOD SEARCH (Gemini primary, supports both APIs) ============
async function aiSearchFood(query, apiKey, provider = 'gemini') {
  const prompt = `You are a Thai nutrition database expert with deep knowledge of:
- Thai restaurant foods (street food, central food court, popular chains)
- Thai consumer brands (drinks, snacks, supplements, ready-to-eat)
- Whey protein brands available in Thailand
- Standard nutrition data for common foods

Food/product query: "${query}"

## IMPORTANT CONTEXT:
- "PROTEN" = Thai whey protein brand (RTD drinks) - flavors: Hokkaido, รสชาไทย, Chocolate, Strawberry
- "Vitaday" = Thai clear protein drink brand
- "Sunshine Dairy" = Thai lactose-free milk brand with protein-enriched line  
- "Hooray" = Thai lactose-free chocolate/protein milk
- "BAAM" or "FITWHEY" = Thai whey protein supplement brand
- "Meiji" = dairy brand (NOT lactose-free unless specified)
- If query is just a brand name (e.g. "PROTEN") → return the most popular/default product of that brand
- If query has brand + flavor (e.g. "PROTEN Hokkaido") → return that exact product

## OUTPUT FORMAT (return ONLY this JSON, no markdown):
{
  "name": "ชื่อผลิตภัณฑ์ภาษาไทย/อังกฤษตามที่ใช้จริง",
  "serving": "ปริมาณเสิร์ฟ (เช่น 1 ขวด 250ml, 1 จาน, 100g)",
  "kcal": <integer>,
  "protein": <number with 1 decimal>,
  "carb": <number with 1 decimal>,
  "fat": <number with 1 decimal>,
  "notes": "หมายเหตุสั้นๆ เช่น 'PROTEN brand RTD whey drink' หรือ 'ร้านอาหารไทยทั่วไป'"
}

For Thai dishes: estimate standard restaurant serving.
For branded products: use actual product nutrition label data.
For ambiguous queries: prefer the most common interpretation (e.g. "PROTEN" → whey brand, not generic protein).`;

  // In Claude artifact mode (no API key needed), use Anthropic
  if (HAS_CLAUDE_STORAGE && !apiKey) {
    return await callAnthropic(prompt);
  }

  if (!apiKey) {
    throw new Error('ต้องใส่ API key ใน Settings ก่อนใช้ AI search');
  }

  // Auto-detect provider from key format if not specified
  if (apiKey.startsWith('sk-ant-')) {
    return await callAnthropic(prompt, apiKey);
  }
  return await callGemini(prompt, apiKey);
}

async function callGemini(prompt, apiKey) {
  // Try models in order — fall back if one fails
  // Updated for May 2026: 2.0-flash retired for new projects, 2.5-flash has thinking tokens
  // Best choices: 2.5-flash-lite (cheap, stable, no thinking) or 2.5-flash (with thinkingBudget=0)
  const modelChain = [
    { name: 'gemini-2.5-flash-lite', disableThinking: false },
    { name: 'gemini-2.5-flash', disableThinking: true },
    { name: 'gemini-flash-latest', disableThinking: false }
  ];
  
  let lastError = null;
  
  for (const model of modelChain) {
    try {
      return await tryGeminiModel(prompt, apiKey, model.name, model.disableThinking);
    } catch (e) {
      lastError = e;
      console.warn(`Model ${model.name} failed:`, e.message);
      // Only continue trying if it's a model-not-found error
      if (!e.message.includes('404') && !e.message.includes('not found') && !e.message.includes('NOT_FOUND')) {
        throw e;
      }
    }
  }
  
  throw lastError || new Error('ไม่สามารถเชื่อมต่อ Gemini model ใดๆ ได้');
}

async function tryGeminiModel(prompt, apiKey, modelName, disableThinking) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
  
  const generationConfig = {
    temperature: 0.2,
    maxOutputTokens: 2048,
    responseMimeType: "application/json"
  };
  
  // Disable thinking for 2.5-flash to avoid JSON truncation
  if (disableThinking) {
    generationConfig.thinkingConfig = { thinkingBudget: 0 };
  }
  
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig
    })
  });
  
  if (!response.ok) {
    const errText = await response.text();
    let errMsg = `Gemini API ${response.status}`;
    try {
      const errJson = JSON.parse(errText);
      errMsg = errJson.error?.message || errMsg;
    } catch {}
    
    if (response.status === 400) {
      if (errMsg.toLowerCase().includes('api key')) throw new Error('API key ไม่ถูกต้อง — ตรวจสอบที่ aistudio.google.com');
      throw new Error(`ข้อผิดพลาด: ${errMsg.slice(0, 150)}`);
    }
    if (response.status === 404) throw new Error(`404 model ${modelName} not found`);
    if (response.status === 429) throw new Error('เกิน rate limit — รอสักครู่แล้วลองใหม่');
    if (response.status === 403) throw new Error('API key ไม่มีสิทธิ์ — เปิด Generative Language API ที่ console.cloud.google.com');
    throw new Error(errMsg.slice(0, 200));
  }
  
  const data = await response.json();
  const candidate = data?.candidates?.[0];
  if (!candidate) throw new Error('ไม่ได้รับผลลัพธ์จาก AI — ลองใหม่');
  if (candidate.finishReason === 'SAFETY') throw new Error('AI ปฏิเสธคำขอ — ลองชื่ออาหารอื่น');
  if (candidate.finishReason === 'MAX_TOKENS') throw new Error('AI ตอบยาวเกินไป — ลองพิมพ์ชื่อสั้นลง');
  
  const text = candidate?.content?.parts?.[0]?.text || '';
  if (!text.trim()) throw new Error('AI ส่งคำตอบว่างเปล่า — ลองใหม่');
  
  let clean = text.trim()
    .replace(/^```json\s*/i, '')
    .replace(/^```\s*/i, '')
    .replace(/```\s*$/i, '')
    .trim();
  
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (jsonMatch) clean = jsonMatch[0];
  
  try {
    const result = JSON.parse(clean);
    if (typeof result.kcal !== 'number' || typeof result.protein !== 'number') {
      throw new Error('AI ตอบในรูปแบบที่ไม่ถูกต้อง');
    }
    return {
      name: result.name || 'อาหาร',
      serving: result.serving || '1 ส่วน',
      kcal: Math.round(result.kcal),
      protein: +(result.protein).toFixed(1),
      carb: +((result.carb ?? 0)).toFixed(1),
      fat: +((result.fat ?? 0)).toFixed(1),
      notes: result.notes || ''
    };
  } catch (parseErr) {
    console.error('JSON parse failed. Raw response:', text);
    throw new Error('AI ตอบในรูปแบบที่อ่านไม่ได้ — ลองใหม่');
  }
}

async function callAnthropic(prompt, apiKey = null) {
  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers,
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`Anthropic API ${response.status}: ${errText.slice(0, 200)}`);
    }
    const data = await response.json();
    const text = data.content.filter(b => b.type === "text").map(b => b.text).join("").trim();
    const clean = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
    return JSON.parse(clean);
  } catch (e) {
    console.error('Anthropic search failed:', e);
    throw new Error(e.message || 'ค้นหาไม่สำเร็จ');
  }
}

  useEffect(() => {
    (async () => {
      const p = await Storage.get('profile', DEFAULT_PROFILE);
      const g = await Storage.get('goals', DEFAULT_GOALS);
      const f = await Storage.get('foods_custom', []);
      const k = await Storage.get('api_key', '');
      setProfile(p);
      setGoals(g);
      setFoods([...SEED_FOODS, ...f]);
      setApiKey(k);
      setLoaded(true);
    })();
  }, []);
  
  const showToast = useCallback((msg, type = 'info') => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(null), 2200);
  }, []);
  
  const saveProfile = useCallback(async (p) => {
    setProfile(p);
    await Storage.set('profile', p);
  }, []);
  
  const saveGoals = useCallback(async (g) => {
    setGoals(g);
    await Storage.set('goals', g);
  }, []);
  
  const saveApiKey = useCallback(async (k) => {
    setApiKey(k);
    await Storage.set('api_key', k);
  }, []);
  
  const addCustomFood = useCallback(async (food) => {
    const customFoods = await Storage.get('foods_custom', []);
    const updated = [...customFoods, { ...food, custom: true, id: `cust_${Date.now()}` }];
    await Storage.set('foods_custom', updated);
    setFoods([...SEED_FOODS, ...updated]);
    return food;
  }, []);
  
  const deleteCustomFood = useCallback(async (foodName) => {
    const customFoods = await Storage.get('foods_custom', []);
    const updated = customFoods.filter(f => f.name !== foodName);
    await Storage.set('foods_custom', updated);
    setFoods([...SEED_FOODS, ...updated]);
  }, []);
  
  const toggleWheyCategory = useCallback(async (foodName) => {
    const customFoods = await Storage.get('foods_custom', []);
    const updated = customFoods.map(f => {
      if (f.name === foodName) {
        return { ...f, category: f.category === 'whey' ? undefined : 'whey' };
      }
      return f;
    });
    await Storage.set('foods_custom', updated);
    setFoods([...SEED_FOODS, ...updated]);
  }, []);
  
  return { profile, goals, foods, apiKey, loaded, toast, showToast, saveProfile, saveGoals, saveApiKey, addCustomFood, deleteCustomFood, toggleWheyCategory };
}

function ProgressRing({ value, target, size = 110, label, unit, color = '#C2410C', subtle }) {
  const radius = size / 2 - 8;
  const circumference = 2 * Math.PI * radius;
  const pct = Math.min(100, (value / target) * 100);
  const dashoffset = circumference - (pct / 100) * circumference;
  const remaining = Math.max(0, target - value);
  const over = Math.max(0, value - target);
  
  return (
    <div style={{ width: size, position:'relative', display:'flex', flexDirection:'column', alignItems:'center' }}>
      <svg width={size} height={size} className="ring-progress">
        <circle cx={size/2} cy={size/2} r={radius} fill="none" strokeWidth={8} className="ring-bg" />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" strokeWidth={8} stroke={pct > 100 ? '#DC2626' : color} strokeDasharray={circumference} strokeDashoffset={dashoffset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
      </svg>
      <div style={{ position:'absolute', top:0, left:0, width:size, height:size, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <div style={{ fontSize: 11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:500 }}>{label}</div>
        <div style={{ fontSize: 22, fontWeight: 600, color: pct > 100 ? '#DC2626' : '#2C2C2A', fontVariantNumeric:'tabular-nums' }}>{Math.round(value)}</div>
        <div style={{ fontSize: 11, color:'#A8A6A0', fontVariantNumeric:'tabular-nums' }}>/ {target} {unit}</div>
      </div>
    </div>
  );
}

function StatChip({ label, value, color, sub }) {
  return (
    <div style={{ flex:1, background:'rgba(0,0,0,0.03)', padding:'10px 12px', borderRadius:10, minWidth:0 }}>
      <div style={{ fontSize:11, color:'#6B6862', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.3px' }}>{label}</div>
      <div style={{ fontSize:18, fontWeight:600, color: color || '#2C2C2A', fontVariantNumeric:'tabular-nums', marginTop:2 }}>{value}</div>
      {sub && <div style={{ fontSize:11, color:'#A8A6A0', marginTop:1 }}>{sub}</div>}
    </div>
  );
}

  const [notes, setNotes] = useState('');
  const [pickerOpen, setPickerOpen] = useState(null);
  const [editEntry, setEditEntry] = useState(null);
  const [backupReminder, setBackupReminder] = useState(null);
  const [reminderDismissed, setReminderDismissed] = useState(false);
  const [dayTypeOverride, setDayTypeOverride] = useState(null); // null=auto, 'training', 'rest'
  const [workoutBurn, setWorkoutBurn] = useState({ steps: 0, strength: 0, cardio: 0, workout: 0, total: 0 });
  
  // Determine training status: manual override wins, else auto from schedule
  const isTraining = dayTypeOverride ? dayTypeOverride === 'training' : isTrainingDay(date, goals.trainingDays);
  const dayGoal = isTraining ? goals.training : goals.rest;
  const isAuto = !dayTypeOverride;
  
  // Auto-refresh to today when app becomes visible (handles day rollover)
  useEffect(() => {
    const refreshIfNeeded = () => {
      const today = todayStr();
      // Only auto-jump if currently viewing a past date AND today is newer
      // Don't disturb if user manually navigated back
      setDate(curr => {
        if (curr < today) {
          // Was viewing yesterday or earlier
          // If the gap is just because midnight passed (curr was today and now is tomorrow)
          // we want to jump to today. Otherwise leave user choice alone.
          const yesterday = dateOffset(today, -1);
          // Auto-jump only if currently viewing yesterday (most common case after midnight)
          return curr === yesterday ? today : curr;
        }
        return curr;
      });
    };
    const handleVisibility = () => {
      if (!document.hidden) refreshIfNeeded();
    };
    document.addEventListener('visibilitychange', handleVisibility);
    window.addEventListener('focus', refreshIfNeeded);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('focus', refreshIfNeeded);
    };
  }, []);
  
  // Check backup status once on mount
  useEffect(() => {
    (async () => {
      const lastBackup = await Storage.get('last_backup_at');
      const dismissedAt = await Storage.get('reminder_dismissed_at');
      const dismissed = dismissedAt && (Date.now() - dismissedAt) < 24 * 60 * 60 * 1000; // 24h dismiss
      
      if (dismissed) {
        setReminderDismissed(true);
        return;
      }
      
      if (!lastBackup) {
        // Never backed up - show after 3 days of data
        const allKeys = await Storage.list('log:');
        if (allKeys.length >= 3) {

                  <div style={{ fontSize:10, color:'#A8A6A0', marginTop:2, lineHeight:1.4 }}>
                    TDEE {tdee.toLocaleString()}{extraBurn > 0 ? ` + ออกกำลัง ${extraBurn}` : ''}
                    {workoutBurn.strength > 0 || workoutBurn.cardio > 0 ? (
                      <span> ({workoutBurn.strength > 0 ? `เวท ${workoutBurn.strength}` : ''}{workoutBurn.strength > 0 && workoutBurn.cardio > 0 ? ' + ' : ''}{workoutBurn.cardio > 0 ? `คาร์ดิโอ ${workoutBurn.cardio}` : ''})</span>
                    ) : null}
                  </div>
                </div>
                <span style={{ fontSize:15, fontWeight:600, fontVariantNumeric:'tabular-nums', color:'#C2410C' }}>−{Math.round(totalBurn).toLocaleString()}</span>
              </div>
            </div>
            
            {/* Net result */}
            <div style={{ borderTop:'1px solid rgba(0,0,0,0.06)', paddingTop:12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                <span style={{ fontSize:13, fontWeight:600, color: isDeficit ? '#0F766E' : '#DC2626' }}>
                  {isDeficit ? '📉 ขาดดุล (Deficit)' : '📈 เกินดุล (Surplus)'}
                </span>
                <span style={{ fontSize:22, fontWeight:700, fontVariantNumeric:'tabular-nums', color: isDeficit ? '#0F766E' : '#DC2626' }}>
                  {isDeficit ? '' : '+'}{Math.round(net).toLocaleString()} <span style={{ fontSize:12, fontWeight:500 }}>kcal</span>
                </span>
              </div>
              <div style={{ fontSize:12, color:'#6B6862', display:'flex', alignItems:'center', gap:4 }}>
                {isDeficit ? (
                  <>≈ ลดน้ำหนัก ~<strong style={{ color:'#0F766E' }}>{weeklyKg.toFixed(2)} kg/สัปดาห์</strong> 🎯</>
                ) : (
                  <>≈ เพิ่มน้ำหนัก ~<strong style={{ color:'#DC2626' }}>{Math.abs(weeklyKg).toFixed(2)} kg/สัปดาห์</strong></>
                )}
              </div>
            </div>
            
            {/* Footnote */}
            <div style={{ fontSize:9, color:'#A8A6A0', marginTop:10, lineHeight:1.5, background:'rgba(0,0,0,0.02)', padding:'8px 10px', borderRadius:8 }}>
              💡 TDEE รวมการเดิน+กิจวัตรปกติแล้ว — นับเฉพาะ "เวท+คาร์ดิโอ" เพิ่ม (ไม่นับก้าวซ้ำ) · ค่าประมาณ ±15% · ดูเทรนด์น้ำหนักจริงแม่นกว่า
            </div>
          </div>
        );
      })()}
      
      {/* Meal sections */}
      <div style={{ marginBottom:14 }}>
        {MEAL_TYPES.map(meal => {
          const entries = meals[meal.id] || [];
          const subtotal = entries.reduce((s,e) => ({ kcal: s.kcal + e.kcal, protein: s.protein + e.protein }), { kcal: 0, protein: 0 });
          return (
            <div key={meal.id} style={{ background:'#fff', borderRadius:12, padding:'14px 14px 12px', marginBottom:8, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: entries.length ? 10 : 0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ fontSize: 18 }}>{meal.icon}</span>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600 }}>{meal.label}</div>
                    {entries.length > 0 && (
                      <div style={{ fontSize:11, color:'#6B6862', fontVariantNumeric:'tabular-nums' }}>
                        {Math.round(subtotal.kcal)} kcal · {Math.round(subtotal.protein)}g P
                      </div>
                    )}
                  </div>
                </div>
                <button onClick={() => setPickerOpen(meal.id)} style={{ background:'#C2410C', color:'#fff', width:30, height:30, borderRadius:8, fontWeight:600, fontSize:18, lineHeight:1, display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
              </div>
              {entries.map(entry => (
                <div key={entry.id} onClick={() => setEditEntry({ mealId: meal.id, entry })} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', background:'rgba(0,0,0,0.025)', borderRadius:8, marginTop:6 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{entry.name}</div>
                    <div style={{ fontSize:11, color:'#6B6862', marginTop:1, fontVariantNumeric:'tabular-nums' }}>
                      {entry.qty !== 1 && `${entry.qty}× · `}{Math.round(entry.kcal)} kcal · {entry.protein.toFixed(1)}g P
                    </div>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); removeEntry(meal.id, entry.id); }} style={{ width:24, height:24, borderRadius:6, background:'transparent', color:'#A8A6A0', fontSize:16, marginLeft:8 }}>×</button>
                </div>
              ))}
            </div>
          );
        })}
      </div>
      
      {/* Weight + Notes */}
      <div style={{ background:'#fff', borderRadius:12, padding:14, marginBottom:14, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
          <span style={{ fontSize:18 }}>⚖️</span>
          <div style={{ flex:1, fontSize:14, fontWeight:600 }}>น้ำหนักเช้านี้</div>
          <input
            type="number"
            inputMode="decimal"
            step="0.1"
            value={weight}
            onChange={(e) => setWeight(e.target.value)}
            onBlur={() => saveDay(undefined, weight)}
            placeholder="--"
            style={{ width:90, padding:'8px 10px', border:'1px solid rgba(0,0,0,0.1)', borderRadius:8, textAlign:'right', fontWeight:500, fontVariantNumeric:'tabular-nums' }}
          />
          <span style={{ fontSize:13, color:'#6B6862' }}>kg</span>
        </div>
        <textarea
          value={notes}
          onChange={(e) => setNotes(e.target.value)}
          onBlur={() => saveDay(undefined, undefined, notes)}
          placeholder="โน้ตรายวัน — ความรู้สึก, การเทรน, สิ่งที่สังเกต..."
          style={{ width:'100%', minHeight:60, padding:10, border:'1px solid rgba(0,0,0,0.08)', borderRadius:8, resize:'vertical', fontFamily:'inherit', fontSize:13, lineHeight:1.5 }}
        />
      </div>
      
      {/* Food Picker Modal */}
      {pickerOpen && (
        <FoodPicker
          mealId={pickerOpen}
          mealLabel={MEAL_TYPES.find(m => m.id === pickerOpen)?.label}
          foods={foods}
          apiKey={apiKey}
          onPick={(food, qty) => addToMeal(pickerOpen, food, qty)}
          onClose={() => setPickerOpen(null)}
          onSaveFood={addCustomFood}
          showToast={showToast}
        />
      )}
      
      {/* Edit Entry Modal */}
      {editEntry && (
        <EditEntryModal
          entry={editEntry.entry}
          onSave={(updates) => { updateEntry(editEntry.mealId, editEntry.entry.id, updates); setEditEntry(null); }}
          onClose={() => setEditEntry(null)}
          onDelete={() => { removeEntry(editEntry.mealId, editEntry.entry.id); setEditEntry(null); }}
        />
      )}
    </div>
  );
}

// ============ FOOD PICKER MODAL ============
function FoodPicker({ mealId, mealLabel, foods, apiKey, onPick, onClose, onSaveFood, showToast }) {
  const [query, setQuery] = useState('');
  const [aiResult, setAiResult] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);
  const [selectedFood, setSelectedFood] = useState(null);
  const [qty, setQty] = useState(1);
  const [showCustom, setShowCustom] = useState(false);
  const [keyboardHeight, setKeyboardHeight] = useState(0);
  
  // Detect iOS keyboard via visualViewport
  useEffect(() => {
    if (!window.visualViewport) return;
    const handleResize = () => {
      const kbHeight = window.innerHeight - window.visualViewport.height;
      setKeyboardHeight(kbHeight > 100 ? kbHeight : 0);
    };
    window.visualViewport.addEventListener('resize', handleResize);
    handleResize();
    return () => window.visualViewport.removeEventListener('resize', handleResize);
  }, []);
  
  const filtered = useMemo(() => {
    if (!query) return foods.slice(0, 15);
    const q = query.toLowerCase().trim();
    
    // Score each food by relevance
    const scored = foods
      .map(f => {
        const name = f.name.toLowerCase();
        let score = 0;
        if (name === q) score = 100; // exact match
        else if (name.startsWith(q)) score = 80; // starts with query
        else if (name.includes(q)) score = 50; // contains query
        else {
          // Word-by-word match (handles "proten chocolate" matching "PROTEN Chocolate 1 ขวด")
          const words = q.split(/\s+/).filter(w => w.length > 0);
          const allWordsMatch = words.every(w => name.includes(w));
          if (allWordsMatch) score = 30;
        }
        return { food: f, score };
      })
      .filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 20)
      .map(x => x.food);
    
    return scored;
  }, [query, foods]);
  
  const doAISearch = async () => {
    if (!query.trim()) return;
    setAiLoading(true);
    setAiError(null);
    setAiResult(null);
    try {
      const result = await aiSearchFood(query, apiKey);
      setAiResult(result);
    } catch (e) {
      setAiError(e.message);
    } finally {
      setAiLoading(false);
    }
  };
  
  // Add the currently-selected food with the chosen qty, then return to search
  // (picker stays open so multiple items can be logged in one session)
  const confirmAdd = (close = false) => {
    if (!selectedFood) return;
    onPick(selectedFood, qty);
    showToast(`เพิ่ม ${selectedFood.name}${qty !== 1 ? ` ${qty}×` : ''}`, 'success');
    setSelectedFood(null);
    setQty(1);
    if (close) { onClose(); return; }
    // reset search for the next item
    setQuery('');
    setAiResult(null);
    setAiError(null);
  };
  
  const QTY_PRESETS = [0.5, 1, 1.5, 2, 3, 4];
  
  const saveAndPickAI = async () => {
    if (!aiResult) return;
    await onSaveFood(aiResult);
    showToast('บันทึกเข้าฐานข้อมูลแล้ว', 'success');
    setSelectedFood(aiResult); // route to qty panel
  };
  
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', display:'flex', alignItems: keyboardHeight > 0 ? 'flex-start' : 'flex-end', justifyContent:'center', zIndex:200 }}>
      <div onClick={(e) => e.stopPropagation()} className="modal-enter" style={{ position:'relative', background:'#FAF8F3', width:'100%', maxWidth:480, height: keyboardHeight > 0 ? `calc(100% - ${keyboardHeight}px)` : '92dvh', borderRadius: keyboardHeight > 0 ? '0 0 18px 18px' : '18px 18px 0 0', display:'flex', flexDirection:'column', transition:'height 0.2s ease' }}>
        {/* Header — collapses when keyboard is open to keep the search box reachable */}
        {keyboardHeight === 0 && (
          <div style={{ padding:'14px 16px', borderBottom:'1px solid rgba(0,0,0,0.06)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
            <div>
              <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:500 }}>เพิ่มอาหารมื้อ</div>
              <div style={{ fontSize:17, fontWeight:600 }}>{mealLabel}</div>
            </div>
            <button onClick={onClose} style={{ width:32, height:32, borderRadius:8, background:'rgba(0,0,0,0.05)', fontSize:18 }}>×</button>
          </div>
        )}
        
        {/* Search — pinned at the top of the (shrunken) modal so it sits right above the keyboard */}
        <div style={{ padding: keyboardHeight > 0 ? '10px 16px' : '12px 16px', flexShrink:0, display:'flex', gap:8, alignItems:'flex-start' }}>
          <div style={{ flex:1 }}>
            <input
              autoFocus
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="ค้นหา หรือพิมพ์ชื่ออาหาร..."
              style={{ width:'100%', padding:'12px 14px', border:'1px solid rgba(0,0,0,0.1)', borderRadius:10, background:'#fff', fontSize:15 }}
            />
            <div style={{ display:'flex', gap:8, marginTop:10 }}>
              <button onClick={doAISearch} disabled={!query.trim() || aiLoading} style={{ flex:1, padding:'10px', background: query.trim() && !aiLoading ? '#1F2937' : 'rgba(0,0,0,0.08)', color: query.trim() && !aiLoading ? '#fff' : '#A8A6A0', borderRadius:8, fontSize:13, fontWeight:500, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                {aiLoading ? <><span className="spinner"></span> กำลังค้นหา...</> : '✨ AI ค้นหาจาก internet'}
              </button>
              <button onClick={() => setShowCustom(true)} style={{ padding:'10px 14px', background:'rgba(0,0,0,0.05)', borderRadius:8, fontSize:13, fontWeight:500 }}>
                + Custom
              </button>
            </div>
          </div>
          {/* Close button stays reachable even when header is hidden under keyboard */}
          {keyboardHeight > 0 && (
            <button onClick={onClose} style={{ width:36, height:44, borderRadius:8, background:'rgba(0,0,0,0.05)', fontSize:18, flexShrink:0 }}>×</button>
          )}
        </div>
        
        {/* Results */}
        <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', padding:'0 16px 16px', minHeight:0 }}>
          {/* AI Result */}
          {aiError && (
            <div style={{ background:'#FEE2E2', color:'#991B1B', padding:'10px 14px', borderRadius:10, fontSize:13, marginBottom:10 }}>
              {aiError}
            </div>
          )}
          {aiResult && (
            <div style={{ background:'#FEF3C7', border:'1px solid #FCD34D', padding:14, borderRadius:12, marginBottom:14 }}>
              <div style={{ fontSize:11, color:'#92400E', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:600, marginBottom:6 }}>✨ ผลจาก AI</div>
              <div style={{ fontSize:15, fontWeight:600, marginBottom:4 }}>{aiResult.name}</div>
              <div style={{ fontSize:12, color:'#6B6862', marginBottom:8 }}>{aiResult.serving} {aiResult.notes && `· ${aiResult.notes}`}</div>
              <div style={{ display:'flex', gap:14, fontSize:13, marginBottom:12 }}>
                <span><strong style={{ fontVariantNumeric:'tabular-nums' }}>{aiResult.kcal}</strong> kcal</span>
                <span style={{ color:'#0F766E' }}><strong style={{ fontVariantNumeric:'tabular-nums' }}>{aiResult.protein}g</strong> P</span>
                <span style={{ color:'#6B6862' }}>C {aiResult.carb}g</span>
                <span style={{ color:'#6B6862' }}>F {aiResult.fat}g</span>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={() => { setQty(1); setSelectedFood(aiResult); }} style={{ flex:1, padding:10, background:'#C2410C', color:'#fff', borderRadius:8, fontSize:13, fontWeight:500 }}>เพิ่มเลย</button>
                <button onClick={saveAndPickAI} style={{ flex:1, padding:10, background:'#1F2937', color:'#fff', borderRadius:8, fontSize:13, fontWeight:500 }}>เพิ่ม + บันทึกใน DB</button>
              </div>
            </div>
          )}
          
          {/* Food list */}
          {filtered.length === 0 && !aiResult && (
            <div style={{ textAlign:'center', padding:'40px 20px', color:'#A8A6A0', fontSize:13 }}>
              <div style={{ fontSize:32, marginBottom:8 }}>🔍</div>
              ไม่พบในฐานข้อมูล<br/>กดปุ่ม "✨ AI ค้นหา" เพื่อให้ AI ประเมิน
            </div>
          )}
          {filtered.map((food, i) => (
            <div key={i} onClick={() => { setQty(1); setSelectedFood(food); }} style={{ background:'#fff', padding:'12px 14px', borderRadius:10, marginBottom:6, display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{food.name}</div>
                <div style={{ fontSize:11, color:'#6B6862', marginTop:2, fontVariantNumeric:'tabular-nums' }}>
                  {food.kcal} kcal · {food.protein}g P · {food.serving}
                  {food.category === 'whey' && <span style={{ marginLeft:6, padding:'1px 6px', background:'#E0F2FE', color:'#0369A1', borderRadius:4, fontSize:10 }}>WHEY</span>}
                </div>
              </div>
              <div style={{ color:'#C2410C', fontSize:18, fontWeight:600, marginLeft:8 }}>+</div>
            </div>
          ))}
        </div>
        
        {/* Quantity panel — appears after selecting a food, before adding */}
        {selectedFood && (
          <div onClick={() => setSelectedFood(null)} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.35)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:10, borderRadius:'18px 18px 0 0' }}>
            <div onClick={(e) => e.stopPropagation()} className="modal-enter" style={{ background:'#fff', width:'100%', borderRadius:'18px 18px 0 0', padding:18, paddingBottom:'calc(18px + env(safe-area-inset-bottom))' }}>
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:2 }}>
                <div style={{ fontSize:16, fontWeight:600, flex:1, paddingRight:8 }}>{selectedFood.name}</div>
                <button onClick={() => setSelectedFood(null)} style={{ width:28, height:28, borderRadius:8, background:'rgba(0,0,0,0.05)', fontSize:16, flexShrink:0 }}>×</button>
              </div>
              <div style={{ fontSize:12, color:'#6B6862', marginBottom:14 }}>ต่อ {selectedFood.serving} · {selectedFood.kcal} kcal · {selectedFood.protein}g P</div>
              
              {/* Quick presets */}
              <div style={{ display:'flex', gap:6, marginBottom:12, flexWrap:'wrap' }}>
                {QTY_PRESETS.map(p => (
                  <button key={p} onClick={() => setQty(p)} style={{ flex:'1 0 auto', minWidth:48, padding:'8px 0', borderRadius:8, fontSize:14, fontWeight:600, fontVariantNumeric:'tabular-nums', background: qty === p ? '#C2410C' : 'rgba(0,0,0,0.05)', color: qty === p ? '#fff' : '#2C2C2A' }}>{p}×</button>
                ))}
              </div>
              
              {/* Stepper + manual entry */}
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
                <button onClick={() => setQty(Math.max(0.5, +(qty - 0.5).toFixed(2)))} style={{ width:44, height:44, borderRadius:10, background:'rgba(0,0,0,0.06)', fontSize:22, fontWeight:600 }}>−</button>
                <input
                  type="number" inputMode="decimal" step="0.5" min="0.1"
                  value={qty}
                  onChange={(e) => { const v = parseFloat(e.target.value); setQty(isNaN(v) ? '' : v); }}
                  onBlur={(e) => { const v = parseFloat(e.target.value); if (isNaN(v) || v <= 0) setQty(1); }}
                  style={{ flex:1, textAlign:'center', fontSize:24, fontWeight:600, fontVariantNumeric:'tabular-nums', border:'1px solid rgba(0,0,0,0.1)', borderRadius:10, padding:'8px 0', background:'#FAF8F3' }}
                />
                <button onClick={() => setQty(+((parseFloat(qty)||0) + 0.5).toFixed(2))} style={{ width:44, height:44, borderRadius:10, background:'rgba(0,0,0,0.06)', fontSize:22, fontWeight:600 }}>+</button>
              </div>
              
              {/* Live preview */}
              <div style={{ background:'rgba(0,0,0,0.03)', padding:14, borderRadius:10, marginBottom:16, display:'flex', justifyContent:'space-around', textAlign:'center' }}>
                <div>
                  <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', fontWeight:500 }}>kcal</div>
                  <div style={{ fontSize:20, fontWeight:600, fontVariantNumeric:'tabular-nums', marginTop:2 }}>{Math.round(selectedFood.kcal * (parseFloat(qty)||0))}</div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:'#0F766E', textTransform:'uppercase', fontWeight:500 }}>Protein</div>
                  <div style={{ fontSize:20, fontWeight:600, color:'#0F766E', fontVariantNumeric:'tabular-nums', marginTop:2 }}>{(selectedFood.protein * (parseFloat(qty)||0)).toFixed(1)}g</div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', fontWeight:500 }}>คาร์บ</div>
                  <div style={{ fontSize:20, fontWeight:600, fontVariantNumeric:'tabular-nums', marginTop:2 }}>{(selectedFood.carb * (parseFloat(qty)||0)).toFixed(1)}g</div>
                </div>
              </div>
              
              <div style={{ display:'flex', gap:8 }}>
                <button onClick={() => confirmAdd(false)} style={{ flex:2, padding:'13px', background:'#C2410C', color:'#fff', borderRadius:10, fontSize:15, fontWeight:600 }}>＋ เพิ่ม (ค้นต่อ)</button>
                <button onClick={() => confirmAdd(true)} style={{ flex:1, padding:'13px', background:'#1F2937', color:'#fff', borderRadius:10, fontSize:13, fontWeight:500 }}>เพิ่ม + ปิด</button>
              </div>
            </div>
          </div>
        )}
        
        {/* Custom add modal */}
        {showCustom && (
          <CustomFoodModal
            initialName={query}
            apiKey={apiKey}
            onSave={async (food) => {
              await onSaveFood(food);
              showToast('บันทึกเข้าฐานข้อมูลแล้ว', 'success');
              setShowCustom(false);
              setQty(1);
              setSelectedFood(food); // route to qty panel
            }}
            onClose={() => setShowCustom(false)}
          />
        )}
      </div>
    </div>
  );
}

// ============ CUSTOM FOOD MODAL ============
function CustomFoodModal({ initialName = '', apiKey, onSave, onClose }) {
  const [name, setName] = useState(initialName);
  const [kcal, setKcal] = useState('');
  const [protein, setProtein] = useState('');
  const [carb, setCarb] = useState('');
  const [fat, setFat] = useState('');
  const [serving, setServing] = useState('1 ส่วน');
  const [category, setCategory] = useState('general');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);
  const [keyboardHeight, setKeyboardHeight] = useState(0);
  
  useEffect(() => {
    if (!window.visualViewport) return;
    const handleResize = () => {
      const kbHeight = window.innerHeight - window.visualViewport.height;
      setKeyboardHeight(kbHeight > 100 ? kbHeight : 0);
    };
    window.visualViewport.addEventListener('resize', handleResize);
    handleResize();
    return () => window.visualViewport.removeEventListener('resize', handleResize);
  }, []);
  
  const canSave = name.trim() && kcal !== '' && protein !== '';
  const canSearchAI = name.trim().length > 0;
  
  // Auto-detect whey category from name keywords
  useEffect(() => {
    if (name && category === 'general') {
      const lower = name.toLowerCase();
      const wheyKeywords = ['whey', 'เวย์', 'protein', 'โปรตีน', 'proten', 'vitaday', 'sunshine dairy', 'hooray', 'baam'];
      if (wheyKeywords.some(k => lower.includes(k))) {
        setCategory('whey');
      }
    }
  }, [name]);
  
  const doAISearch = async () => {
    if (!canSearchAI) return;
    setAiLoading(true);
    setAiError(null);
    try {
      const result = await aiSearchFood(name, apiKey);
      setName(result.name || name);
      setServing(result.serving || '1 ส่วน');
      setKcal(String(result.kcal));
      setProtein(String(result.protein));
      setCarb(String(result.carb));
      setFat(String(result.fat));
    } catch (e) {
      setAiError(e.message);
    } finally {
      setAiLoading(false);
    }
  };
  
  const handleSave = () => {
    if (!canSave) return;
    const food = {
      name: name.trim(),
      kcal: Math.round(+kcal),
      protein: +(+protein).toFixed(1),
      carb: +(+(carb || 0)).toFixed(1),
      fat: +(+(fat || 0)).toFixed(1),
      serving: serving.trim() || '1 ส่วน'
    };
    if (category === 'whey') food.category = 'whey';
    onSave(food);
  };
  
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems: keyboardHeight > 0 ? 'flex-start' : 'center', justifyContent:'center', zIndex:200, padding:16, paddingTop: keyboardHeight > 0 ? 'calc(env(safe-area-inset-top) + 16px)' : 16, paddingBottom: keyboardHeight > 0 ? `${keyboardHeight + 16}px` : 16, overflow:'auto' }}>

              <button 
                onClick={() => setCategory('general')}
                style={{ flex:1, padding:'8px', background: category === 'general' ? '#fff' : 'transparent', color: category === 'general' ? '#2C2C2A' : '#6B6862', borderRadius:6, fontSize:12, fontWeight: category === 'general' ? 600 : 500, boxShadow: category === 'general' ? '0 1px 2px rgba(0,0,0,0.06)' : 'none' }}
              >
                🍱 อาหารทั่วไป

              <button 
                onClick={() => setCategory('whey')}
                style={{ flex:1, padding:'8px', background: category === 'whey' ? '#0369A1' : 'transparent', color: category === 'whey' ? '#fff' : '#6B6862', borderRadius:6, fontSize:12, fontWeight: category === 'whey' ? 600 : 500, boxShadow: category === 'whey' ? '0 1px 2px rgba(0,0,0,0.1)' : 'none' }}

// ============ TRENDS VIEW ============
function TrendsView({ profile, goals }) {
  const [data, setData] = useState({ weights: [], kcalAvg: [], proteinAvg: [], dates: [] });
  const [range, setRange] = useState(30);
  const weightChartRef = useRef(null);
  const macroChartRef = useRef(null);
  const weightChartInstance = useRef(null);
  const macroChartInstance = useRef(null);
  
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const today = todayStr();
      // Load all days in parallel (much faster for 30/90 day ranges)
      const dates = [];
      for (let i = range - 1; i >= 0; i--) dates.push(dateOffset(today, -i));
      const logs = await Promise.all(dates.map(d => Storage.get(`log:${d}`, null)));
      if (cancelled) return;
      const days = dates.map((d, idx) => {
        const log = logs[idx];
        return {
          date: d,
          weight: log?.weight ? +log.weight : null,
          kcal: log ? Object.values(log.meals || {}).flat().reduce((s,e) => s + e.kcal, 0) : 0,
          protein: log ? Object.values(log.meals || {}).flat().reduce((s,e) => s + e.protein, 0) : 0,
          hasLog: !!log
        };
      });
      
      // 7-day rolling average for weight
      const weightAvg = days.map((d, i) => {
        const window = days.slice(Math.max(0, i - 6), i + 1).filter(x => x.weight !== null);
        if (window.length === 0) return null;
        return window.reduce((s, x) => s + x.weight, 0) / window.length;
      });
      
      setData({ days, weightAvg });
    })();
    return () => { cancelled = true; };
  }, [range]);
  
  // Stats
  const stats = useMemo(() => {
    if (!data.days) return null;
    const logged = data.days.filter(d => d.hasLog);
    const weighed = data.days.filter(d => d.weight !== null);
    const avgKcal = logged.length ? logged.reduce((s,d) => s + d.kcal, 0) / logged.length : 0;
    const avgProtein = logged.length ? logged.reduce((s,d) => s + d.protein, 0) / logged.length : 0;
    const firstWeight = weighed[0]?.weight;
    const lastWeight = weighed[weighed.length - 1]?.weight;
    const weightChange = (firstWeight && lastWeight) ? lastWeight - firstWeight : null;
    return { avgKcal, avgProtein, weightChange, firstWeight, lastWeight, daysLogged: logged.length };
  }, [data]);
  
  // Weight Chart
  useEffect(() => {
    if (!data.days || !weightChartRef.current) return;
    if (weightChartInstance.current) weightChartInstance.current.destroy();
    
    const ctx = weightChartRef.current.getContext('2d');
    weightChartInstance.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.days.map(d => {
          const dt = new Date(d.date);
          return `${dt.getDate()}/${dt.getMonth()+1}`;
        }),
        datasets: [
          {
            label: 'น้ำหนัก',
            data: data.days.map(d => d.weight),
            borderColor: '#C2410C',
            backgroundColor: 'transparent',
            pointRadius: 3,
            pointBackgroundColor: '#C2410C',
            spanGaps: true,
            tension: 0.2,
            borderWidth: 2
          },
          {
            label: 'ค่าเฉลี่ย 7 วัน',
            data: data.weightAvg,
            borderColor: '#0F766E',
            backgroundColor: 'transparent',
            pointRadius: 0,
            borderWidth: 2,
            borderDash: [5, 5],
            tension: 0.4,
            spanGaps: true
          },
          {
            label: 'เป้าหมาย',
            data: data.days.map(() => profile.target_weight),
            borderColor: 'rgba(0,0,0,0.2)',
            backgroundColor: 'transparent',
            pointRadius: 0,
            borderWidth: 1,
            borderDash: [2, 4]
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1F2937', titleFont: { size: 11 }, bodyFont: { size: 12 }, padding: 8 }
        },
        scales: {
          y: { ticks: { font: { size: 10 }, color: '#6B6862' }, grid: { color: 'rgba(0,0,0,0.04)' } },
          x: { ticks: { font: { size: 9 }, color: '#6B6862', maxRotation: 0, autoSkipPadding: 15 }, grid: { display: false } }
        }
      }
    });
    return () => weightChartInstance.current?.destroy();
  }, [data, profile.target_weight]);
  
  // Macro Chart (kcal)
  useEffect(() => {
    if (!data.days || !macroChartRef.current) return;
    if (macroChartInstance.current) macroChartInstance.current.destroy();
    
    const ctx = macroChartRef.current.getContext('2d');
    const isTraining = data.days.map(d => isTrainingDay(d.date, goals.trainingDays));
    
    macroChartInstance.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.days.map(d => {
          const dt = new Date(d.date);
          return `${dt.getDate()}/${dt.getMonth()+1}`;
        }),
        datasets: [
          {
            label: 'kcal',
            data: data.days.map(d => d.kcal),
            backgroundColor: data.days.map((d, i) => {
              if (!d.hasLog) return 'rgba(0,0,0,0.05)';
              const target = isTraining[i] ? goals.training.kcal : goals.rest.kcal;
              if (d.kcal > target + 100) return '#DC2626';
              if (d.kcal < target - 300) return '#F59E0B';
              return '#C2410C';
            }),
            borderRadius: 3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1F2937', titleFont: { size: 11 }, bodyFont: { size: 12 }, padding: 8,
            callbacks: { label: (ctx) => `${Math.round(ctx.parsed.y)} kcal` }
          }
        },
        scales: {
          y: { ticks: { font: { size: 10 }, color: '#6B6862' }, grid: { color: 'rgba(0,0,0,0.04)' } },
          x: { ticks: { font: { size: 9 }, color: '#6B6862', maxRotation: 0, autoSkipPadding: 15 }, grid: { display: false } }
        }
      }
    });
    return () => macroChartInstance.current?.destroy();
  }, [data, goals]);
  
  return (
    <div style={{ padding:'16px 16px 0' }}>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:500 }}>ภาพรวม</div>
        <div style={{ fontSize:22, fontWeight:600, marginTop:2 }}>Trends</div>
      </div>
      
      {/* Range Tabs */}
      <div style={{ display:'flex', gap:6, marginBottom:14, background:'rgba(0,0,0,0.04)', padding:4, borderRadius:10 }}>
        {[7, 14, 30, 90].map(r => (
          <button key={r} onClick={() => setRange(r)} style={{ flex:1, padding:'8px', background: range === r ? '#fff' : 'transparent', color: range === r ? '#2C2C2A' : '#6B6862', borderRadius:8, fontSize:13, fontWeight: range === r ? 600 : 500, boxShadow: range === r ? '0 1px 2px rgba(0,0,0,0.06)' : 'none' }}>
            {r} วัน
          </button>
        ))}
      </div>
      
      {/* Top Stats */}
      {stats && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:14 }}>
          <div style={{ background:'#fff', padding:14, borderRadius:12, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
            <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.3px', fontWeight:500 }}>เปลี่ยน น.น.</div>
            <div style={{ fontSize:24, fontWeight:600, color: stats.weightChange < 0 ? '#0F766E' : stats.weightChange > 0 ? '#DC2626' : '#2C2C2A', marginTop:4, fontVariantNumeric:'tabular-nums' }}>
              {stats.weightChange !== null ? (stats.weightChange > 0 ? '+' : '') + stats.weightChange.toFixed(1) : '—'}
            </div>
            <div style={{ fontSize:11, color:'#A8A6A0', marginTop:2 }}>
              {stats.firstWeight && stats.lastWeight ? `${stats.firstWeight} → ${stats.lastWeight} kg` : 'ไม่มีข้อมูลพอ'}
            </div>
          </div>
          <div style={{ background:'#fff', padding:14, borderRadius:12, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
            <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.3px', fontWeight:500 }}>เฉลี่ย kcal/วัน</div>
            <div style={{ fontSize:24, fontWeight:600, marginTop:4, fontVariantNumeric:'tabular-nums' }}>
              {stats.avgKcal ? Math.round(stats.avgKcal) : '—'}
            </div>
            <div style={{ fontSize:11, color:'#A8A6A0', marginTop:2 }}>{stats.daysLogged} วันที่บันทึก</div>
          </div>
          <div style={{ background:'#fff', padding:14, borderRadius:12, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
            <div style={{ fontSize:11, color:'#0F766E', textTransform:'uppercase', letterSpacing:'0.3px', fontWeight:500 }}>เฉลี่ย Protein</div>
            <div style={{ fontSize:24, fontWeight:600, color:'#0F766E', marginTop:4, fontVariantNumeric:'tabular-nums' }}>
              {stats.avgProtein ? Math.round(stats.avgProtein) + 'g' : '—'}
            </div>
            <div style={{ fontSize:11, color:'#A8A6A0', marginTop:2 }}>เป้า {goals.rest.protein}-{goals.training.protein}g</div>
          </div>
          <div style={{ background:'#fff', padding:14, borderRadius:12, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
            <div style={{ fontSize:11, color:'#6B6862', textTransform:'uppercase', letterSpacing:'0.3px', fontWeight:500 }}>เหลือถึงเป้า</div>
            <div style={{ fontSize:24, fontWeight:600, color:'#C2410C', marginTop:4, fontVariantNumeric:'tabular-nums' }}>
              {stats.lastWeight ? (stats.lastWeight - profile.target_weight).toFixed(1) : '—'}
            </div>
            <div style={{ fontSize:11, color:'#A8A6A0', marginTop:2 }}>kg → {profile.target_weight} kg</div>
          </div>
        </div>
      )}
      
      {/* Weight Chart */}
      <div style={{ background:'#fff', borderRadius:12, padding:14, marginBottom:12, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
          <div style={{ fontSize:14, fontWeight:600 }}>น้ำหนัก</div>
          <div style={{ display:'flex', gap:10, fontSize:11, color:'#6B6862' }}>
            <span style={{ display:'flex', alignItems:'center', gap:4 }}><span style={{ width:10, height:2, background:'#C2410C', display:'inline-block' }}></span>รายวัน</span>
            <span style={{ display:'flex', alignItems:'center', gap:4 }}><span style={{ width:10, height:2, background:'#0F766E', display:'inline-block' }}></span>เฉลี่ย 7 วัน</span>
          </div>
        </div>
        <div style={{ position:'relative', height:200 }}>
          <canvas ref={weightChartRef} role="img" aria-label="Weight chart over time"></canvas>
        </div>
      </div>
      
      {/* Kcal Chart */}
      <div style={{ background:'#fff', borderRadius:12, padding:14, marginBottom:14, boxShadow:'0 1px 2px rgba(0,0,0,0.03)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>

          <div style={{ display:'flex', gap:8, fontSize:10, color:'#6B6862' }}>
