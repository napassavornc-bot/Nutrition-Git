  async set(key, value) {
    try {
      if (HAS_CLAUDE_STORAGE) {
        await window.storage.set(key, JSON.stringify(value));
      } else {
        // Write to both localStorage (fast) and IndexedDB (durable)
        try {
          localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
        } catch {}
        IDB.set(key, value); // fire-and-forget for IDB
      }
      return true;
    } catch {
      return false;
    }
  },
  async delete(key) {
    try {
      if (HAS_CLAUDE_STORAGE) {
        await window.storage.delete(key);
      } else {
        try {
          localStorage.removeItem(LS_PREFIX + key);
        } catch {}
        IDB.delete(key);
      }
      return true;
    } catch {
      return false;
    }
  },
  async list() {
    let prefix = arguments.length > 0 && arguments[0] !== undefined ? arguments[0] : '';
    try {
      if (HAS_CLAUDE_STORAGE) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      }
      // Combine keys from both stores
      const keySet = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_PREFIX + prefix)) {
          keySet.add(k.replace(LS_PREFIX, ''));
        }
      }
      const idbKeys = await IDB.listKeys(prefix);
      idbKeys.forEach(k => keySet.add(k));
      return Array.from(keySet);
    } catch {
      return [];
    }
  },
  mode() {
    return HAS_CLAUDE_STORAGE ? 'claude' : 'browser';
  }
};

  return ids.map(id => getExercise(id)).filter(Boolean);
}

// Helper: safety badge for exercise
function getSafetyBadge(safety) {
  if (safety === 'machine_safest') return {
    icon: '🟢',
    label: 'เครื่อง',
    color: '#065F46',
    bg: '#D1FAE5'
  };
  if (safety === 'safe_solo') return {
    icon: '🟡',
    label: 'คนเดียวได้',
    color: '#92400E',
    bg: '#FEF3C7'
  };
  if (safety === 'spotter_recommended') return {
    icon: '🔴',
    label: 'ต้องมี spotter',
    color: '#991B1B',
    bg: '#FEE2E2'
  };
  return {
    icon: '⚪',
    label: '',
    color: '#6B6862',
    bg: 'rgba(0,0,0,0.05)'
  };
}

// ============ AI FOOD SEARCH (Gemini primary, supports both APIs) ============
async function aiSearchFood(query, apiKey) {
  let provider = arguments.length > 2 && arguments[2] !== undefined ? arguments[2] : 'gemini';
  const prompt = `You are a Thai nutrition database expert with deep knowledge of:
- Thai restaurant foods (street food, central food court, popular chains)
- Thai consumer brands (drinks, snacks, supplements, ready-to-eat)
- Whey protein brands available in Thailand
- Standard nutrition data for common foods

Food/product query: "${query}"

## IMPORTANT CONTEXT:
- "PROTEN" = Thai whey protein brand (RTD drinks) - flavors: Hokkaido, รสชาไทย, Chocolate, Strawberry
- "Vitaday" = Thai clear protein drink brand
- "Sunshine Dairy" = Thai lactose-free milk brand with protein-enriched line  
- "Hooray" = Thai lactose-free chocolate/protein milk
- "BAAM" or "FITWHEY" = Thai whey protein supplement brand
- "Meiji" = dairy brand (NOT lactose-free unless specified)
- If query is just a brand name (e.g. "PROTEN") → return the most popular/default product of that brand
- If query has brand + flavor (e.g. "PROTEN Hokkaido") → return that exact product

## OUTPUT FORMAT (return ONLY this JSON, no markdown):
{
  "name": "ชื่อผลิตภัณฑ์ภาษาไทย/อังกฤษตามที่ใช้จริง",
  "serving": "ปริมาณเสิร์ฟ (เช่น 1 ขวด 250ml, 1 จาน, 100g)",
  "kcal": <integer>,
  "protein": <number with 1 decimal>,
  "carb": <number with 1 decimal>,
  "fat": <number with 1 decimal>,
  "notes": "หมายเหตุสั้นๆ เช่น 'PROTEN brand RTD whey drink' หรือ 'ร้านอาหารไทยทั่วไป'"
}

For Thai dishes: estimate standard restaurant serving.
For branded products: use actual product nutrition label data.
For ambiguous queries: prefer the most common interpretation (e.g. "PROTEN" → whey brand, not generic protein).`;

  // In Claude artifact mode (no API key needed), use Anthropic
  if (HAS_CLAUDE_STORAGE && !apiKey) {
    return await callAnthropic(prompt);
  }
  if (!apiKey) {
    throw new Error('ต้องใส่ API key ใน Settings ก่อนใช้ AI search');
  }

  // Auto-detect provider from key format if not specified
  if (apiKey.startsWith('sk-ant-')) {
    return await callAnthropic(prompt, apiKey);
  }
  return await callGemini(prompt, apiKey);
}
async function callGemini(prompt, apiKey) {
  // Try models in order — fall back if one fails
  // Updated for May 2026: 2.0-flash retired for new projects, 2.5-flash has thinking tokens
  // Best choices: 2.5-flash-lite (cheap, stable, no thinking) or 2.5-flash (with thinkingBudget=0)
  const modelChain = [{
    name: 'gemini-2.5-flash-lite',
    disableThinking: false
  }, {
    name: 'gemini-2.5-flash',
    disableThinking: true
  }, {
    name: 'gemini-flash-latest',
    disableThinking: false
  }];
  let lastError = null;
  for (const model of modelChain) {
    try {
      return await tryGeminiModel(prompt, apiKey, model.name, model.disableThinking);
    } catch (e) {
      lastError = e;
      console.warn(`Model ${model.name} failed:`, e.message);
      // Only continue trying if it's a model-not-found error
      if (!e.message.includes('404') && !e.message.includes('not found') && !e.message.includes('NOT_FOUND')) {
        throw e;
      }
    }
  }
  throw lastError || new Error('ไม่สามารถเชื่อมต่อ Gemini model ใดๆ ได้');
}
async function tryGeminiModel(prompt, apiKey, modelName, disableThinking) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
  const generationConfig = {
    temperature: 0.2,
    maxOutputTokens: 2048,
    responseMimeType: "application/json"
  };

  // Disable thinking for 2.5-flash to avoid JSON truncation
  if (disableThinking) {
    generationConfig.thinkingConfig = {
      thinkingBudget: 0
    };
  }
  const response = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      contents: [{
        parts: [{
          text: prompt
        }]
      }],
      generationConfig
    })
  });
  if (!response.ok) {
    const errText = await response.text();
    let errMsg = `Gemini API ${response.status}`;
    try {
      const errJson = JSON.parse(errText);
      errMsg = errJson.error?.message || errMsg;
    } catch {}

// Self-contained. Reuses the app's stored api_key + the same providers
// (Anthropic / Gemini), but NOT the food-locked callAnthropic/callGemini
// (Gemini's helper validates kcal; Anthropic's is capped at 1000 tokens).

function coachParseJSON(text) {
  let clean = String(text).trim()
    .replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (m) clean = m[0];
  return JSON.parse(clean);
}

async function coachAnthropic(prompt, apiKey) {
  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Anthropic API ${response.status}: ${errText.slice(0, 200)}`);
  }
  const data = await response.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("").trim();
  return coachParseJSON(text);
}

async function coachGemini(prompt, apiKey) {
  const modelChain = [
    { name: 'gemini-2.5-flash-lite', disableThinking: false },
    { name: 'gemini-2.5-flash', disableThinking: true },
    { name: 'gemini-flash-latest', disableThinking: false }
  ];
  let lastError = null;
  for (const model of modelChain) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model.name}:generateContent?key=${apiKey}`;
      const generationConfig = { temperature: 0.3, maxOutputTokens: 2048, responseMimeType: "application/json" };
      if (model.disableThinking) generationConfig.thinkingConfig = { thinkingBudget: 0 };
      const response = await fetch(url, {
